<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa - Restaurar contraseña</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-white">
  <div class="app-screen">

   
    <div class="topbar topbar-left">
      <a href="login.html" class="back-btn" aria-label="Volver">
        <i class="fa-solid fa-chevron-left"></i>
      </a>

      <h1 class="top-title top-title-left">Restaura tu contraseña</h1>
    </div>

    <header class="header-image">
      <img src="img/logo-white.png" alt="Header Milpa" class="header-image__img">
    </header>

   
    <main class="px-4 pb-4 form-overlap">
      <form class="mt-3" onsubmit="return false;">

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-user"></i></span>
          <input type="email" class="form-control milpa-control" placeholder="Correo electrónico" required>
        </div>

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-lock"></i></span>
          <input id="newPassword" type="password" class="form-control milpa-control" placeholder="Nueva contraseña" required>

          <button class="milpa-eye" type="button"
                  onclick="togglePassword('newPassword', 'toggleIconNew')" aria-label="Mostrar u ocultar contraseña">
                  <i class="fa-solid fa-eye" id="toggleIcon"></i>
          </button>
        </div>

    
        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-lock"></i></span>
          <input id="confirmPassword" type="password" class="form-control milpa-control" placeholder="Confirmar contraseña" required>

          <button class="milpa-eye" type="button"
                  onclick="togglePassword('confirmPassword', 'toggleIconConfirm')" aria-label="Mostrar u ocultar contraseña"> 
                  <i class="fa-solid fa-eye" id="toggleIcon"></i>
      
          </button>
        </div>

        <div class="d-flex align-items-center gap-2 mb-4 milpa-check">
          <input class="form-check-input milpa-checkbox" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Recuérdame</label>
        </div>

        <button type="button" class="btn milpa-btn w-100 mb-3" onclick="window.location.href='home.html'">
          Iniciar sesión
        </button>

        <p class="text-center milpa-muted mb-3">
          ¿No tienes una cuenta? <a href="register.html" class="milpa-link fw-semibold">Regístrate</a>
        </p>

      </form>
    </main>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/togglePassword.js"></script>
</body>
</html>
