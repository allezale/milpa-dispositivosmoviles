<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa - Verificación</title>


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
  
</head>

<body class="bg-white">
  <div class="app-screen">


    <div class="topbar topbar-left">
      <a href="register.html" class="back-btn" aria-label="Volver">
        <i class="fa-solid fa-chevron-left"></i>
      </a>

      <h1 class="top-title top-title-left">Verifica tu cuenta</h1>
    </div>

    <main class="px-4 pb-4 verify-page">
      <div class="text-center verify-block">

        <h2 class="verify-title">Código de verificación</h2>
        <p class="verify-subtitle">Introduce el código de<br>verificación en tu correo</p>

        <div class="verify-code" aria-label="Código de verificación">
          <input class="verify-box" inputmode="numeric" maxlength="1" aria-label="Dígito 1">
          <input class="verify-box" inputmode="numeric" maxlength="1" aria-label="Dígito 2">
          <input class="verify-box" inputmode="numeric" maxlength="1" aria-label="Dígito 3">
          <input class="verify-box" inputmode="numeric" maxlength="1" aria-label="Dígito 4">
        </div>

              <button type="button" class="btn milpa-btn w-100 mt-3"
                onclick="window.location.href='success.html'">
          Continuar
        </button>

        <p class="verify-resend mt-3">
          ¿No te ha caído el código?
          <button type="button" id="resendBtn" class="verify-resend-btn" disabled>
            Reenviar código (<span id="timer">30</span>s)
          </button>
        </p>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
