<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa - Crear</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/create.css">
</head>

<body class="bg-white app-body">

  <div class="app-screen home-screen">

    <!-- barra de arriba -->
    <nav class="home-topbar">

      <button class="icon-btn" type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#milpaMenu"
              aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>

      <a href="home.html" class="home-logo-link" aria-label="Inicio">
        <img src="img/logo.png" alt="Milpa" class="home-logo">
      </a>

      <button class="avatar-btn" type="button" onclick="window.location.href='profile.html'">
        <img src="img/avatar.png" alt="Perfil" class="home-avatar">
      </button>

    </nav>


    <div class="offcanvas offcanvas-start milpa-offcanvas" tabindex="-1" id="milpaMenu" aria-labelledby="milpaMenuLabel">
      <div class="offcanvas-header milpa-sidebar-header">
        <div class="milpa-sidebar-brand">
          <img src="img/logo.png" alt="Milpa" class="milpa-sidebar-logo">
          <span class="milpa-sidebar-title">milpa</span>
        </div>
      </div>

      <div class="offcanvas-body milpa-sidebar-body">
        <a href="profile.html" class="sidebar-link">
          <i class="fa-regular fa-user"></i>
          <span>Perfil</span>
        </a>

        <a href="settings.html" class="sidebar-link">
          <i class="fa-solid fa-gear"></i>
          <span>Ajustes</span>
        </a>
      </div>
    </div>

    <!-- crear el contenido -->
    <main class="create-page">
      <div class="create-top-actions">
        <button type="button" class="create-close-btn" aria-label="Cerrar" onclick="window.location.href='home.html'">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <button type="button" class="btn create-publish-btn" id="publishBtn">
          Publicar
        </button>
      </div>

      <section class="create-user-block">
        <img src="img/avatar.png" alt="Maria Fernanda" class="create-user-avatar">

        <div class="create-user-info">
          <h1 class="create-user-name">Luis Serra</h1>
          <p class="create-user-country">Honduras</p>

          <div class="create-chips">
            <button type="button" class="create-chip">
              Tema <i class="fa-solid fa-chevron-down"></i>
            </button>

            <button type="button" class="create-chip create-chip-light">
              Público <i class="fa-solid fa-chevron-down"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="create-input-block">
        <textarea id="postText" class="create-textarea" placeholder="¿Qué tienes en mente?"></textarea>
      </section>

      <section class="create-tools-grid">
        <button type="button" class="create-tool" id="addImageBtn">
          <span class="create-tool-icon"><i class="fa-regular fa-image"></i></span>
          <span class="create-tool-label">Imagen</span>
        </button>

        <button type="button" class="create-tool">
          <span class="create-tool-icon"><i class="fa-solid fa-video"></i></span>
          <span class="create-tool-label">Video</span>
        </button>

        <button type="button" class="create-tool">
          <span class="create-tool-icon create-tool-text">GIF</span>
          <span class="create-tool-label">GIF</span>
        </button>

        <button type="button" class="create-tool">
          <span class="create-tool-icon"><i class="fa-regular fa-newspaper"></i></span>
          <span class="create-tool-label">Plantilla</span>
        </button>

        <button type="button" class="create-tool">
          <span class="create-tool-icon"><i class="fa-solid fa-tag"></i></span>
          <span class="create-tool-label">Etiqueta</span>
        </button>

        <button type="button" class="create-tool">
          <span class="create-tool-icon"><i class="fa-solid fa-location-dot"></i></span>
          <span class="create-tool-label">Ubicación</span>
        </button>
      </section>
    </main>

    <!-- barra de nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-link" data-page="home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="chat.html" class="bottom-nav-link" data-page="chat">
        <i class="fa-solid fa-comments"></i>
        <span>Chat</span>
      </a>

      <a href="create.html" class="bottom-nav-link" data-page="create">
        <i class="fa-regular fa-square-plus"></i>
        <span>Crear</span>
      </a>

      <a href="notifications.html" class="bottom-nav-link" data-page="notifications">
        <i class="fa-regular fa-bell"></i>
        <span>Notificaciones</span>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/home.js"></script>
  <script src="js/create.js"></script>
</body>
</html>
