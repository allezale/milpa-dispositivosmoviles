<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa - Chat</title>


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-white app-body">

  <div class="app-screen home-screen">

<!-- barra de arriba el menu el logo y pfp -->
    <header class="home-topbar">
      <button class="icon-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#milpaMenu" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>

      <a href="home.html" class="home-logo-link" aria-label="Inicio">
        <img src="img/logo.png" alt="Milpa" class="home-logo">
      </a>

      <button class="avatar-btn" type="button" onclick="window.location.href='profile.html'">
        <img src="img/avatar.png" alt="Perfil" class="home-avatar">
      </button>
    </header>

<!-- hmb de la izq-->
<div class="offcanvas offcanvas-start milpa-offcanvas" tabindex="-1" id="milpaMenu" aria-labelledby="milpaMenuLabel">
  <div class="offcanvas-header milpa-sidebar-header">
    <div class="milpa-sidebar-brand">
      <img src="img/logo.png" alt="Milpa" class="milpa-sidebar-logo">
      <span class="milpa-sidebar-title">milpa</span>
    </div>
  </div>

  <div class="offcanvas-body milpa-sidebar-body">
    <a href="profile.html" class="sidebar-link">
      <i class="fa-regular fa-user"></i>
      <span>Perfil</span>
    </a>

    <a href="favorites.html" class="sidebar-link">
      <i class="fa-regular fa-heart"></i>
      <span>Favoritos</span>
    </a>

    <a href="settings.html" class="sidebar-link">
      <i class="fa-solid fa-gear"></i>
      <span>Ajustes</span>
    </a>
  </div>
</div>

    <!-- Chats -->
    <main class="chat-page">
      <section class="chat-header-block">
        <h1 class="chat-title">Mensajes</h1>

        <div class="chat-search">
          <input type="text" placeholder="Buscar" aria-label="Buscar chat">
          <button type="button" aria-label="Buscar">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </section>

      <section class="chat-list">

        <!-- Chat 1 -->
        <article class="chat-item">
          <button type="button" class="chat-item-btn">
            <div class="chat-avatar-wrap">
              <img src="img/user1.png" alt="Alexis Figueroa" class="chat-avatar">
              <span class="chat-status online"></span>
            </div>

            <div class="chat-info">
              <div class="chat-row-top">
                <h2 class="chat-name">Alexis Figueroa</h2>
                <span class="chat-time">ahora</span>
              </div>

              <div class="chat-row-bottom">
                <p class="chat-preview">Hola!</p>
              </div>
            </div>
          </button>
        </article>

        <!-- Chat 2 -->
        <article class="chat-item">
          <button type="button" class="chat-item-btn">
            <div class="chat-avatar-wrap">
              <img src="img/user2.png" alt="Sabila Sayma" class="chat-avatar">
              <span class="chat-status offline"></span>
            </div>

            <div class="chat-info">
              <div class="chat-row-top">
                <h2 class="chat-name">Sabila Sayma</h2>
                <span class="chat-time">3 min</span>
              </div>

              <div class="chat-row-bottom">
                <p class="chat-preview">como estas?</p>
              </div>
            </div>
          </button>
        </article>

      </section>
    </main>


   <!-- Barra de nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-link" data-page="home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="chat.html" class="bottom-nav-link" data-page="chat">
        <i class="fa-solid fa-comments"></i>
        <span>Chat</span>
      </a>

      <a href="create.html" class="bottom-nav-link" data-page="create">
        <i class="fa-regular fa-square-plus"></i>
        <span>Crear</span>
      </a>

      <a href="notifications.html" class="bottom-nav-link" data-page="notifications">
        <i class="fa-regular fa-bell"></i>
        <span>Notificaciones</span>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
