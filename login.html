<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa- Login</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-white">
  <div class="app-screen">


    <div class="topbar">
      <a href="index.html" class="back-btn" aria-label="Volver">
        <i class="fa-solid fa-chevron-left"></i>
      </a>

      <h1 class="top-title">Únete a Milpa</h1>
      <div class="topbar-spacer"></div>
    </div>

    <header class="header-image">
      <img src="img/logo-white.png" alt="Header Milpa" class="header-image__img">
    </header>


    <main class="px-4 pb-4 form-overlap">

      <form class="mt-3" onsubmit="return false;">

        
        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-user"></i></span>
          <input type="email" class="form-control milpa-control" placeholder="Correo electrónico" required>
        </div>

       
        <div class="milpa-input mb-2">
          <span class="milpa-icon"><i class="fa-solid fa-lock"></i></span>
          <input id="myPassword" type="password" class="form-control milpa-control" placeholder="Contraseña" required>

          <button class="milpa-eye" type="button" onclick="togglePassword()" aria-label="Mostrar u ocultar contraseña">
          </button>
        </div>

        <div class="text-end mb-4">
          <a href="forgot.html" class="milpa-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="button" class="btn milpa-btn w-100 mb-3">
          Iniciar sesión
        </button>

        <p class="text-center milpa-muted mb-3">
          ¿No tienes una cuenta? <a href="register.html" class="milpa-link fw-semibold">Regístrate</a>
        </p>

        <div class="milpa-divider my-3">
          <span>O inicia sesión con</span>
        </div>

        <div class="d-flex justify-content-center gap-4 mt-3">
          <button type="button" class="social-btn" aria-label="Google">
            <i class="fa-brands fa-google"></i>
          </button>

          <button type="button" class="social-btn" aria-label="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
          </button>
        </div>

      </form>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/togglePassword.js"></script>
</body>
</html>
