<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Milpa - Registro</title>

  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-white">
  <div class="app-screen">


    <div class="topbar topbar-left">
      <a href="login.html" class="back-btn" aria-label="Volver">
        <i class="fa-solid fa-chevron-left"></i>
      </a>

      <h1 class="top-title top-title-left">Regístrate en Milpa</h1>
    </div>


    <header class="header-image">
      <img src="img/logo-white.png" alt="Header Milpa" class="header-image__img">
    </header>

 
    <main class="px-4 pb-4 form-overlap">
      <form class="mt-3" onsubmit="return false;">

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-user"></i></span>
          <input type="text" class="form-control milpa-control" placeholder="Nombre completo" required>
        </div>

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-user"></i></span>
          <input type="text" class="form-control milpa-control" placeholder="Nacionalidad / País" required>
        </div>

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-user"></i></span>
          <input type="email" class="form-control milpa-control" placeholder="Correo electrónico" required>
        </div>

        <div class="milpa-input mb-3">
          <span class="milpa-icon"><i class="fa-solid fa-lock"></i></span>
          <input id="regPassword" type="password" class="form-control milpa-control" placeholder="Contraseña" required>

          <button class="milpa-eye" type="button"
                  onclick="togglePassword('regPassword','toggleIconReg')"
                  aria-label="Mostrar u ocultar contraseña">
            <i class="fa-solid fa-eye" id="toggleIconReg"></i>
          </button>
        </div>

        <div class="milpa-input mb-4">
          <span class="milpa-icon"><i class="fa-solid fa-lock"></i></span>
          <input id="regConfirmPassword" type="password" class="form-control milpa-control" placeholder="Confirmar contraseña" required>

          <button class="milpa-eye" type="button"
                  onclick="togglePassword('regConfirmPassword','toggleIconRegConfirm')"
                  aria-label="Mostrar u ocultar contraseña">
            <i class="fa-solid fa-eye" id="toggleIconRegConfirm"></i>
          </button>
        </div>

        <button type="button" class="btn milpa-btn w-100 mb-3" onclick="window.location.href='verify.html'">
          Registrarme
        </button>

        <p class="text-center milpa-muted mb-3">
          ¿Ya tienes una cuenta? <a href="login.html" class="milpa-link fw-semibold">Inicia sesión</a>
        </p>

      </form>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/togglePassword.js"></script>
</body>
</html>
